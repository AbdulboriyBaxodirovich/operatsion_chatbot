services:
  postgres:
    build: ./postgres
    container_name: brb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - brb_network

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: brb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant/data:/qdrant/storage
    restart: unless-stopped
    networks:
      - brb_network

  chat-app:
    build: ./app
    container_name: brb-bank-chatbot
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    environment:
      - ENV=production
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped
    networks:
      - brb_network

networks:
  brb_network:
    external: true